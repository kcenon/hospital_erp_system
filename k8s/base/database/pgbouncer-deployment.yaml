apiVersion: apps/v1
kind: Deployment
metadata:
  name: pgbouncer
  labels:
    app.kubernetes.io/name: pgbouncer
    app.kubernetes.io/component: database
spec:
  replicas: 2
  selector:
    matchLabels:
      app.kubernetes.io/name: pgbouncer
  template:
    metadata:
      labels:
        app.kubernetes.io/name: pgbouncer
        app.kubernetes.io/component: database
    spec:
      containers:
        - name: pgbouncer
          image: bitnami/pgbouncer:1.23.1
          ports:
            - containerPort: 6432
              protocol: TCP
          env:
            - name: POSTGRESQL_HOST
              value: postgres
            - name: POSTGRESQL_PORT
              value: '5432'
            - name: POSTGRESQL_DATABASE
              value: hospital_erp
            - name: POSTGRESQL_USERNAME
              valueFrom:
                secretKeyRef:
                  name: database-credentials
                  key: username
            - name: POSTGRESQL_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: database-credentials
                  key: password
            - name: PGBOUNCER_POOL_MODE
              value: transaction
            - name: PGBOUNCER_DEFAULT_POOL_SIZE
              value: '20'
            - name: PGBOUNCER_MAX_CLIENT_CONN
              value: '200'
            - name: PGBOUNCER_MAX_DB_CONNECTIONS
              value: '50'
            - name: PGBOUNCER_SERVER_TLS_SSLMODE
              value: require
          resources:
            requests:
              cpu: 100m
              memory: 64Mi
            limits:
              cpu: 500m
              memory: 256Mi
          readinessProbe:
            tcpSocket:
              port: 6432
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            tcpSocket:
              port: 6432
            initialDelaySeconds: 15
            periodSeconds: 20
          volumeMounts:
            - name: pgbouncer-config
              mountPath: /bitnami/pgbouncer/conf
              readOnly: true
      volumes:
        - name: pgbouncer-config
          configMap:
            name: pgbouncer-config
